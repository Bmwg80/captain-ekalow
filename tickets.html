<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolling Loud Rotterdam - Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container mt-4">
        <header class="custom-header">
            <div>rolling loud Rotterdam</div>
<nav class="custom-nav mt-2">
    <a href="index.html">home</a>
    <a href="artists.html">line-up</a>
    <a href="tickets.html">tickets</a>
    <a href="cathering.html">cathering</a>
</nav>
        </header>

        <div class="main-box">
            <h2 class="box-title">tickets</h2>
            
            <div class="row g-4">
                <div class="col-md-8">
                    <div class="white-panel">
                        <h4 class="mb-4 text-uppercase fw-bold">koop tickets</h4>
                        
                        <form id="ticket-form">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <label for="ticket1">
                                    <span class="d-block fw-semibold text-white">Regular Ticket</span>
                                    <span class="d-block small" style="color: #888888;">€85.00</span>
                                </label>
                                <div class="d-flex align-items-center">
                                    <span class="product-line me-3"></span>
                                    <input type="number" id="ticket1" min="0" max="10" value="0" style="width: 60px;">
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <label for="ticket2">
                                    <span class="d-block fw-semibold text-white">VIP Ticket</span>
                                    <span class="d-block small" style="color: #888888;">€150.00</span>
                                </label>
                                <div class="d-flex align-items-center">
                                    <span class="product-line me-3"></span>
                                    <input type="number" id="ticket2" min="0" max="10" value="0" style="width: 60px;">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn-bestel">bestel</button>
                            <div class="clearfix"></div>
                        </form>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-2 h-100">
                        <div class="ticket-image-container border rounded h-100">
                            <img src="ken and carti.jpeg" alt="Tickets" class="ticket-side-img">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
